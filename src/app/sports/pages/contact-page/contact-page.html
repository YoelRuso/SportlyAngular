<div class="contact-wrapper">
  <app-header />

  <main class="contact-shell">

    @if (loading) {
      <div class="contact-box">
        <p class="contact-status">Cargando...</p>
      </div>
    } @else if (error || !contact) {
      <div class="contact-box">
        <p class="contact-status">Error al cargar el contenido.</p>
      </div>
    } @else {
      <div class="contact-box">
        <h1>{{ contact.title }}</h1>
        <p>{{ contact.description }}</p>

        @for (item of contact.items; track item.value) {
          <div class="contact-item">
            <i [class]="item.icon"></i>
            @if (item.type === 'text') {
              <span>{{ item.value }}</span>
            } @else {
              <a [href]="item.href"
                 [attr.target]="item.type === 'link' ? '_blank' : null"
                 rel="noopener">{{ item.value }}</a>
            }
          </div>
        }

      </div>
    }

  </main>

  <app-footer />
</div>
