<div class="registration-wrapper">
  <section>
    <h1>Crear Cuenta en MatchAlert</h1>

    <form #registrationForm="ngForm" (ngSubmit)="onRegistration(registrationForm)">

      <div>
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="tu@correo.com"
          [(ngModel)]="email"
          (ngModelChange)="serverEmailError = ''"
          required
          [pattern]="emailPattern"
          #emailControl="ngModel"
          [ngClass]="{ invalid: (emailControl.invalid || serverEmailError) && (emailControl.touched || submitted) }"
        >
        <small class="error" *ngIf="serverEmailError">
          {{ serverEmailError }}
        </small>
        <small class="error" *ngIf="!serverEmailError && emailControl.invalid && (emailControl.touched || submitted)">
          Correo inválido
        </small>
      </div>

      <div>
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            name="password"
            id="password"
            [(ngModel)]="password"
            required
            [pattern]="passwordPattern"
            #passwordControl="ngModel"
            [ngClass]="{ invalid: passwordControl.invalid && (passwordControl.touched || submitted) }"
          >
          <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
            </svg>
          </button>
        </div>
        <small class="error" *ngIf="passwordControl.invalid && (passwordControl.touched || submitted)">
          Mín. 7 caracteres, mayúscula, minúscula, número y símbolo
        </small>
      </div>

      <div>
        <label for="confirmPassword">Confirmar contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            #confirmControl="ngModel"
            [ngClass]="{ invalid: (confirmControl.invalid || (confirmPassword && password !== confirmPassword)) && (confirmControl.touched || submitted) }"
          >
          <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
            </svg>
          </button>
        </div>
        <small class="error" *ngIf="((confirmControl.invalid || password !== confirmPassword) && (confirmControl.touched || submitted))">
          Las contraseñas no coinciden
        </small>
      </div>

      <div class="options">
        <label>
          <input
            type="checkbox"
            name="terms"
            [(ngModel)]="termsAccepted"
            #termsControl="ngModel"
            required
          >
          Acepto los términos y condiciones
        </label>
      </div>

      <small class="error" *ngIf="submitted && !termsAccepted">
        Es necesario aceptar los términos y condiciones
      </small>

      <button type="submit">Registrarse</button>

    </form>

    <p>¿Ya tienes una cuenta?
      <a routerLink="/login" routerLinkActive="active">Inicia sesión</a>
    </p>

  </section>
</div>
