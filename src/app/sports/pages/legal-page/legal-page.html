<div class="legal-wrapper">
  <app-header />

  <div class="legal-container">

    <app-sidebar
      [sections]="sections"
      [active]="active"
      [sidebarOpen]="sidebarOpen"
      (selectSection)="select($event)"
      (toggle)="toggleSidebar()"
    />

    <main class="legal-content">
      <h1>{{ active.title }}</h1>
      <div class="legal-text" [innerHTML]="active.content"></div>
    </main>

  </div>

  <app-footer />
</div>
