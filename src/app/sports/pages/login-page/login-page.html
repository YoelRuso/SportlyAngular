<div class="login-wrapper">
    <section>
    <h1>Iniciar Sesión en MatchAlert</h1>

    <form (ngSubmit)="onLogin()">
        <div>
        <label for="email">Correo Electrónico</label>
        <input
            type="email"
            name="email"
            placeholder="tu@correo.com"
            id="email"
            [(ngModel)]="email"
            required
        >
        </div>

        <div>
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                [(ngModel)]="password"
                id="password"
                required
            >
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
            </svg>
            </button>
        </div>
        </div>

        <div class="options">
        <label>
            <input type="checkbox" id="remember">
            Recordarme
        </label>
        </div>

        <button type="submit" [disabled]="loading"> {{ loading ? "Estas entrando ..." : "Entrar" }}</button>
    </form>

    <p>¿No tienes una cuenta? <a routerLink="/registration" routerLinkActive="active">Regístrate</a></p>
    </section>
</div>
