<header class="site-header">
  <div class="header-inner">
    <a routerLink="/home" class="brand" aria-label="Ir al inicio">
      <img src="/images/marca-icono.png" alt="Sportly Logo" class="brand-logo" />
    </a>

    <nav class="desktop-nav" aria-label="Principal">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Inicio</a>
      <a routerLink="/resumen" routerLinkActive="active" class="nav-link">Resumen</a>
      <a routerLink="/calendario" routerLinkActive="active" class="nav-link">Calendario</a>
    </nav>

    <div class="header-actions">
      <button class="auth-btn" (click)="toggleAuth()" *ngIf="!(isLoggedIn$ | async)">Login</button>
      <button class="auth-btn auth-btn--outline" (click)="logout()" *ngIf="isLoggedIn$ | async">Logout</button>

      <button class="avatar-btn" (click)="handleAvatarClick()" aria-label="Perfil de usuario">
        <img
          src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
          alt="Avatar de usuario"
          class="avatar"
        />
      </button>

      <button
        class="menu-toggle"
        type="button"
        (click)="mobileMenuOpen = !mobileMenuOpen"
        [attr.aria-expanded]="mobileMenuOpen"
        aria-label="Abrir menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <nav class="mobile-nav" [class.mobile-nav--open]="mobileMenuOpen" aria-label="Menu movil">
    <a routerLink="/home" class="mobile-link" (click)="mobileMenuOpen = false">Inicio</a>
    <a routerLink="/resumen" class="mobile-link" (click)="mobileMenuOpen = false">Resumen</a>
    <a routerLink="/calendario" class="mobile-link" (click)="mobileMenuOpen = false">Calendario</a>
  </nav>
</header>
